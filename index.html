<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Páscoa | Agência Edilsom de Campos</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: 'Playfair Display', serif;
            background-color: #1a120b;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .video-bg {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            object-fit: cover;
            filter: brightness(0.6);
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 0 20px;
        }

        h1 {
            font-size: clamp(4rem, 10vw, 8rem); 
            color: #d4af37; 
            margin: 0;
            text-shadow: 3px 5px 15px rgba(0, 0, 0, 0.9);
            line-height: 1;
            letter-spacing: 2px;
        }
        
        p.subtitulo {
            font-size: clamp(1.2rem, 3vw, 2rem);
            color: #EBD8B2; 
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.9);
            margin-top: 20px;
            max-width: 800px;
        }

        .footer-credit {
            position: fixed;
            bottom: 25px;
            z-index: 2;
            color: rgba(255, 255, 255, 0.5);
            font-family: 'Arial', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline class="video-bg">
        <source src="ovo_pascoa.mp4" type="video/mp4">
    </video>

    <div class="content">
        <h1>PÁSCOA</h1>
        <p class="subtitulo">O melhor momento para se comer um verdadeiro chocolate.</p>
    </div>

    <div class="footer-credit">
        Created by Edilsom de Campos as a portfolio piece on AI-Assisted Development.
    </div>

</body>
</html>
